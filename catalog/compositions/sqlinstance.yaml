---
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: sqlinstance-gcp-cloudsql
  labels:
    provider: gcp
    database: postgresql
spec:
  compositeTypeRef:
    apiVersion: platform.fh-burgenland.at/v1alpha1
    kind: SQLInstance
  mode: Pipeline
  pipeline:
    - step: patch-and-transform
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          # 1) The Cloud SQL instance itself
          - name: instance
            base:
              apiVersion: sql.gcp.m.upbound.io/v1beta1
              kind: DatabaseInstance
              spec:
                forProvider:
                  region: europe-west1
                  databaseVersion: POSTGRES_18
                  deletionProtection: false
                  settings:
                    tier: db-f1-micro
                    # Private IP only: without this the instance gets a public
                    # IP and ignores the VPC peering. Needs the infra Private
                    # Services Access connection (which consumes the infra
                    # `private_services_access_range_name` output) on this
                    # network first. Keep `privateNetwork` in sync with the infra
                    # `vpc_self_link` output so the two do not drift.
                    ipConfiguration:
                      ipv4Enabled: false
                      privateNetwork: projects/project-03eb5b2f-b0b9-4171-b14/global/networks/vpc-platform
                providerConfigRef:
                  kind: ClusterProviderConfig
                  name: default
            patches:
              - fromFieldPath: spec.parameters.region
                toFieldPath: spec.forProvider.region
              - fromFieldPath: spec.parameters.databaseVersion
                toFieldPath: spec.forProvider.databaseVersion
              - fromFieldPath: spec.parameters.tier
                toFieldPath: spec.forProvider.settings.tier
              - fromFieldPath: spec.parameters.privateNetwork
                toFieldPath: spec.forProvider.settings.ipConfiguration.privateNetwork
              - type: ToCompositeFieldPath
                fromFieldPath: metadata.annotations[crossplane.io/external-name]
                toFieldPath: status.instanceName
          # 2) A database on that instance
          - name: database
            base:
              apiVersion: sql.gcp.m.upbound.io/v1beta1
              kind: Database
              spec:
                forProvider:
                  instanceSelector:
                    matchControllerRef: true
                providerConfigRef:
                  kind: ClusterProviderConfig
                  name: default
            patches:
              - fromFieldPath: spec.parameters.databaseName
                toFieldPath: metadata.annotations[crossplane.io/external-name]
          # 3) An application user on that instance
          - name: user
            base:
              apiVersion: sql.gcp.m.upbound.io/v1beta1
              kind: User
              spec:
                forProvider:
                  instanceSelector:
                    matchControllerRef: true
                providerConfigRef:
                  kind: ClusterProviderConfig
                  name: default
            patches:
              - fromFieldPath: spec.parameters.databaseName
                toFieldPath: metadata.annotations[crossplane.io/external-name]
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: "%s-user"
