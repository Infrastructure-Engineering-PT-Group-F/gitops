---
apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: xtenants.platform.fh-burgenland.at
spec:
  scope: Namespaced
  group: platform.fh-burgenland.at
  names:
    kind: XTenant
    plural: xtenants
  defaultCompositionRef:
    name: xtenant-weather-app
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                parameters:
                  type: object
                  properties:
                    name:
                      type: string
                      description: Short tenant identifier, without the tenant- namespace prefix.
                      pattern: "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$"
                    environment:
                      type: string
                      description: Tenant lifecycle environment.
                      enum:
                        - staging
                        - validation
                        - production
                    hostname:
                      type: string
                      description: Public hostname for the tenant under the platform wildcard domain.
                    backendImageTag:
                      type: string
                      description: Backend container image tag to deploy.
                    frontendImageTag:
                      type: string
                      description: Frontend container image tag to deploy.
                    size:
                      type: string
                      description: Tenant size class. Only small is rendered in the first Composition version.
                      default: small
                      enum:
                        - small
                        - medium
                        - large
                  required:
                    - name
                    - environment
                    - hostname
                    - backendImageTag
                    - frontendImageTag
              required:
                - parameters
