---
apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: sqlinstances.platform.fh-burgenland.at
spec:
  scope: Namespaced
  group: platform.fh-burgenland.at
  names:
    kind: SQLInstance
    plural: sqlinstances
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                parameters:
                  type: object
                  properties:
                    region:
                      type: string
                      description: GCP region for the Cloud SQL instance.
                      default: europe-west1
                    databaseVersion:
                      type: string
                      description: Cloud SQL Postgres engine version.
                      default: POSTGRES_18
                      enum:
                        - POSTGRES_16
                        - POSTGRES_17
                        - POSTGRES_18
                    tier:
                      type: string
                      description: Cloud SQL machine type (cost driver).
                      default: db-f1-micro
                    privateNetwork:
                      type: string
                      description: >-
                        Self-link of the VPC the instance gets its private IP on.
                        Must match the infra `vpc_self_link` output and have the
                        Private Services Access connection established.
                      default: projects/dark-diagram-496907-k8/global/networks/vpc-platform
                    databaseName:
                      type: string
                      description: Name of the application database to create.
                    credentialsSecretName:
                      type: string
                      description: >-
                        Name of the ESO-managed Secret (in the SQLInstance
                        namespace) holding the database url/username/password.
                      default: weather-app-backend-db
                    connectionSecretName:
                      type: string
                      description: >-
                        Name of the Crossplane-owned Secret (in the SQLInstance
                        namespace) the composition writes with the non-secret
                        connection info (`host`, `port`, `database`). ESO reads
                        `host` from it to build the JDBC url.
                      default: weather-app-backend-db-conn
                  required:
                    - databaseName
              required:
                - parameters
            status:
              type: object
              properties:
                instanceName:
                  type: string
                  description: External name of the provisioned Cloud SQL instance.
                host:
                  type: string
                  description: Private IP of the instance
