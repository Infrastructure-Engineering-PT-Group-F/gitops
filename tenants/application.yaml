---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tenants
  namespace: argocd
  annotations:
    # Generate tenants after platform add-ons and catalog definitions.
    argocd.argoproj.io/sync-wave: "10"
spec:
  goTemplate: true
  goTemplateOptions:
    - "missingkey=error"
  # Keep tenant resources (namespace, Cloud SQL, secrets) if a generated
  # Application is ever removed, so offboarding a tenant is an explicit,
  # documented cleanup, not an accidental cascade delete of a billable DB.
  syncPolicy:
    preserveResourcesOnDeletion: true
  generators:
    - git:
        repoURL: https://github.com/Infrastructure-Engineering-PT-Group-F/gitops.git
        revision: main
        directories:
          - path: tenants/*
  template:
    metadata:
      name: "tenant-{{.path.basename}}"
    spec:
      project: platform
      source:
        repoURL: https://github.com/Infrastructure-Engineering-PT-Group-F/gitops.git
        targetRevision: main
        path: "{{.path.path}}"
        directory:
          recurse: true
      destination:
        server: https://kubernetes.default.svc
        namespace: default
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
          - SkipDryRunOnMissingResource=true
