---
# Resource quotas and limit ranges for the validation tenant namespace.
#
# Same default tenant tier as tenants/staging/resource-limits.yaml. The
# ResourceQuota caps namespace consumption and the LimitRange supplies the
# per-container default requests and limits. See tenants/README.md for the values
# and reasoning.
apiVersion: v1
kind: ResourceQuota
metadata:
  name: tenant-quota
  namespace: tenant-validation
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  hard:
    requests.cpu: "1"
    requests.memory: 1Gi
    limits.cpu: "3"
    limits.memory: 2Gi
    pods: "10"
    persistentvolumeclaims: "2"
    services: "5"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: tenant-limits
  namespace: tenant-validation
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  limits:
    - type: Container
      default:
        cpu: 250m
        memory: 256Mi
      defaultRequest:
        cpu: 50m
        memory: 64Mi
      max:
        cpu: "1"
        memory: 1Gi
      min:
        cpu: 10m
        memory: 16Mi
