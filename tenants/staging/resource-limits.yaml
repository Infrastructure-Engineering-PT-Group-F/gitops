---
# Resource quotas and limit ranges for the staging tenant namespace.
#
# Default tenant tier. The ResourceQuota caps total namespace consumption so a
# single tenant cannot starve the cluster. The LimitRange supplies per-container
# default requests and limits and bounds any single container. In the target model
# the catalog Composition renders these per tenant, selected by the XTenant size field.
# See tenants/README.md for the chosen values and the reasoning.
apiVersion: v1
kind: ResourceQuota
metadata:
  name: tenant-quota
  namespace: tenant-staging
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  hard:
    requests.cpu: "1"
    requests.memory: 1Gi
    limits.cpu: "3"
    limits.memory: 2Gi
    pods: "10"
    persistentvolumeclaims: "2"
    services: "5"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: tenant-limits
  namespace: tenant-staging
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  limits:
    - type: Container
      default:
        cpu: 250m
        memory: 256Mi
      defaultRequest:
        cpu: 50m
        memory: 64Mi
      max:
        cpu: "1"
        memory: 1Gi
      min:
        cpu: 10m
        memory: 16Mi
