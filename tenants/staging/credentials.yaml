---
# Auto-generates the database password
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: db-password
  namespace: tenant-staging
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  length: 32
  digits: 5
  symbols: 0
  noUpper: false
  allowRepeat: true

---
# ServiceAccount ESO impersonates to read the in-cluster connection Secret
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-store-reader
  namespace: tenant-staging
  annotations:
    argocd.argoproj.io/sync-wave: "1"

---
# Lets eso-store-reader read Secrets in this namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: eso-store-reader
  namespace: tenant-staging
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: eso-store-reader
  namespace: tenant-staging
  annotations:
    argocd.argoproj.io/sync-wave: "1"
subjects:
  - kind: ServiceAccount
    name: eso-store-reader
    namespace: tenant-staging
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: eso-store-reader

---
# Allows the ESO controller to generate a token for eso-store-reader
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: eso-store-reader-token
  namespace: tenant-staging
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: [""]
    resources: ["serviceaccounts/token"]
    resourceNames: ["eso-store-reader"]
    verbs: ["create"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: eso-store-reader-token
  namespace: tenant-staging
  annotations:
    argocd.argoproj.io/sync-wave: "1"
subjects:
  - kind: ServiceAccount
    name: external-secrets
    namespace: external-secrets
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: eso-store-reader-token

---
# Kubernetes-provider store: reads the Crossplane connection
# Secret in this namespace
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: in-cluster
  namespace: tenant-staging
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  provider:
    kubernetes:
      remoteNamespace: tenant-staging
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        serviceAccount:
          name: eso-store-reader

---
# Produces weather-app-backend-db with url/username/password.
# refreshInterval 0: generate the password exactly once. Until the instance is
# ready and the connection Secret exists, ESO retries on error (no churn).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: weather-app-backend-db
  namespace: tenant-staging
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  refreshInterval: "0"
  target:
    name: weather-app-backend-db
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        username: "appdb-user"
        password: "{{ .password }}"
        url: "jdbc:postgresql://{{ .host }}:5432/{{ .database }}"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: db-password
    - extract:
        key: weather-app-backend-db-conn
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
      sourceRef:
        storeRef:
          name: in-cluster
          kind: SecretStore
