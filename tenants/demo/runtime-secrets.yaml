---
# Runtime-secret delivery for the Argo CD-owned demo tenant.
# All payloads remain in Google Secret Manager. This manifest contains only
# source names, target contracts, and non-secret registry metadata.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: api-keys
  namespace: tenant-demo
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: api-keys
    creationPolicy: Owner
    template:
      engineVersion: v2
      mergePolicy: Merge
      type: Opaque
  data:
    - secretKey: avwx-api-key
      remoteRef:
        key: avwx-api-key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
---
# Workload image-pull Secret for the private GHCR backend and frontend images.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-pull
  namespace: tenant-demo
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: ghcr-pull
    creationPolicy: Owner
    template:
      engineVersion: v2
      mergePolicy: Replace
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: >-
          {{ printf "{\"auths\":{\"ghcr.io\":{\"username\":\"%s\",\"password\":\"%s\",\"auth\":\"%s\"}}}" "hochschule-jz" .token (printf "%s:%s" "hochschule-jz" .token | b64enc) }}
  data:
    - secretKey: token
      remoteRef:
        key: ghcr-pull
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
---
# Helm chart pull credentials for Crossplane provider-helm OCI access.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-chart-pull
  namespace: tenant-demo
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: ghcr-chart-pull
    creationPolicy: Owner
    template:
      engineVersion: v2
      mergePolicy: Replace
      type: Opaque
      data:
        username: hochschule-jz
        password: "{{ .token }}"
  data:
    - secretKey: token
      remoteRef:
        key: ghcr-pull
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
