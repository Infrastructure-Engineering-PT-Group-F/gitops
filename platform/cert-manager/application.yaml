---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    # Install early so certificate CRDs exist before tenant resources request TLS.
    argocd.argoproj.io/sync-wave: "-10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    targetRevision: v1.20.2
    helm:
      releaseName: cert-manager
      values: |
        crds:
          enabled: true
        serviceAccount:
          name: cert-manager
          annotations:
            iam.gke.io/gcp-service-account: cert-manager-dns01-sa@dark-diagram-496907-k8.iam.gserviceaccount.com
        extraObjects:
          - |
            apiVersion: cert-manager.io/v1
            kind: ClusterIssuer
            metadata:
              name: letsencrypt-staging-dns01
              annotations:
                argocd.argoproj.io/sync-wave: "10"
            spec:
              acme:
                email: "2510781019@hochschule-burgenland.at"
                server: https://acme-staging-v02.api.letsencrypt.org/directory
                privateKeySecretRef:
                  name: letsencrypt-staging-dns01-account-key
                solvers:
                  - selector:
                      dnsZones:
                        - gcp.ajdininfrastructure.lol
                    dns01:
                      cloudDNS:
                        project: dark-diagram-496907-k8
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
