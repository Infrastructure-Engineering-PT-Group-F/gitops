---
# Wildcard TLS certificate for the shared Gateway's HTTPS listener.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-gcp
  namespace: platform-gateway
spec:
  secretName: wildcard-gcp-tls
  dnsNames:
    - "*.gcp.ajdininfrastructure.lol"
  issuerRef:
    name: letsencrypt-prod-dns01
    kind: ClusterIssuer
    group: cert-manager.io
