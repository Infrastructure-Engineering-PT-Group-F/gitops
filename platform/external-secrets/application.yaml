---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  annotations:
    # Install early so the secret CRDs and the ClusterSecretStore exist before
    # add-ons and tenants request synced secrets.
    argocd.argoproj.io/sync-wave: "-10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 2.6.0
    helm:
      releaseName: external-secrets
      values: |
        installCRDs: true
        serviceAccount:
          name: external-secrets
          annotations:
            iam.gke.io/gcp-service-account: external-secrets-sa@dark-diagram-496907-k8.iam.gserviceaccount.com
        extraObjects:
          - |
            apiVersion: external-secrets.io/v1
            kind: ClusterSecretStore
            metadata:
              name: gcp-secret-manager
              annotations:
                argocd.argoproj.io/sync-wave: "10"
            spec:
              provider:
                gcpsm:
                  projectID: dark-diagram-496907-k8
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
